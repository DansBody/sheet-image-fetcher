services:
  - type: web
    name: sheet-image-fetcher
    runtime: node
    plan: free
    buildCommand: PLAYWRIGHT_BROWSERS_PATH=0 npm install && PLAYWRIGHT_BROWSERS_PATH=0 npx playwright install --only-shell chromium
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
